<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM - Contacts</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

  <div class="app-shell">

    <!-- ================================================
         HEADER
         ================================================ -->
    <header class="top-bar">

      <div>
        <h1 class="logo">Cliently</h1>
      </div>

      <!-- Header action buttons -->
      <div class="header-actions">

        <button
          type="button"
          class="header-button"
          data-popup="search-popup"
          aria-haspopup="true"
          aria-expanded="false"
        >Search</button>

        <button
          type="button"
          class="header-button"
          data-popup="team-popup"
          aria-haspopup="true"
          aria-expanded="false"
        >My Team</button>

        <button
          type="button"
          class="header-button"
          data-popup="settings-popup"
          aria-haspopup="true"
          aria-expanded="false"
        >Settings</button>

        <button
          type="button"
          class="header-button"
          data-popup="profile-popup"
          aria-haspopup="true"
          aria-expanded="false"
        >Profile</button>

      </div>

      <!-- Popups — shown/hidden via JS by toggling the .hidden class -->
      <div
        id="search-popup"
        class="popup hidden"
      >
        <h2>Search</h2>
        <input
          type="search"
          placeholder="Search contacts, tasks, deals..."
        />
      </div>

      <div
        id="team-popup"
        class="popup hidden"
      >
        <h2>My Team</h2>
        <p>Team member list goes here...</p>
      </div>

      <div
        id="settings-popup"
        class="popup hidden"
      >
        <h2>Settings</h2>
        <p>Settings options go here...</p>
      </div>

      <div
        id="profile-popup"
        class="popup hidden"
      >
        <h2>Profile</h2>
        <p>User profile info goes here...</p>
        <button
          type="button"
          class="popup-button logout-button"
          id="logout-button"
        >Logout</button>
      </div>

    </header>

    <!-- ================================================
         SIDEBAR
         ================================================ -->
    <aside class="side-bar">
      <nav class="side-nav">
        <ul>
          <li><a href="/"    class="side-nav-link">Dashboard</a></li>
          <li><a href="calendar.html" class="side-nav-link">Calendar</a></li>
          <li><a href="contacts.html" class="side-nav-link">Contacts</a></li>
          <li><a href="deals.html"    class="side-nav-link">Deals</a></li>
          <li><a href="tasks.html"    class="side-nav-link">Tasks</a></li>
        </ul>
      </nav>
    </aside>

    <!-- ================================================
         MAIN CONTENT
         ================================================ -->
    <main class="main-content">

    </main>

  </div>

  <!-- Shell logic (popups, sidebar) -->
  <script type="module" src="src/shell.js"></script>

  <!-- Page logic -->
  <script
    type="module"
    src="src/pages/contact-detail.page.js"
  ></script>
</body>
</html>
